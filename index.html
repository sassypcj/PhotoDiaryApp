<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>오늘의 사진 일기</title>
<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="theme-color" content="#e8927c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="사진일기" />
</head>
<body>
  <header class="app-header">
    <h1 id="appTitle">📷 오늘의 사진 일기</h1>
    <div class="header-actions">
      <button type="button" id="backupBtn" class="header-btn" title="전체 백업">💾 백업</button>
      <button type="button" id="restoreBtn" class="header-btn" title="백업 파일 복원">📥 복원</button>
      <button type="button" id="lockManageBtn" class="header-btn" title="잠금 설정">🔒 잠금 설정</button>
      <input type="file" id="restoreInput" accept="application/json" class="hidden-file-input" />
    </div>
  </header>

  <main>
    <section class="new-entry" id="newEntry">
      <div class="field">
        <!--label for="entryDate">날짜</label-->
        <div class="date-row">
          <span id="entryDateText" class="date-text"></span>
          <button type="button" id="changeDateBtn" class="date-change-btn"> 변경</button>
        </div>
        <input type="date" id="entryDate" class="date-input-hidden" />
      </div>

      <div class="field">
        <!--label for="entryText">오늘 하루는 어땠나요?</label-->
        <div class="textarea-wrap">
          <textarea id="entryText" rows="4" placeholder="나의 오늘을 기록해요~"></textarea>
          <button type="button" id="voiceBtn" class="voice-mic-btn" aria-label="음성으로 기록하기" title="음성으로 기록하기">🎙️</button>
        </div>
        <div class="voice-preview hidden" id="voicePreviewWrap">
          <div class="voice-preview-row">
            <audio id="voicePreviewAudio" controls></audio>
            <button type="button" id="removeVoiceBtn" class="remove-voice-btn" aria-label="음성 삭제">✕</button>
          </div>
          <p class="voice-transcript-preview hidden" id="voiceTranscriptPreview"></p>
        </div>
      </div>

      <div class="field">
        <label for="photoInput" class="photo-label">
          <span id="photoLabelText">📎 사진 추가</span>
        </label>
        <input type="file" id="photoInput" accept="image/*" multiple />
        <div class="photo-preview" id="photoPreview"></div>
      </div>

      <button id="saveBtn" class="save-btn">저장하기</button>
    </section>

    <section class="entry-list-section">
      <div class="section-header">
        <h2>나의 일기장</h2>
        <button type="button" id="viewToggleBtn" class="view-toggle-btn" title="달력 보기" aria-label="달력 보기"></button>
      </div>

      <div id="listView">
        <div id="entryList" class="entry-list"></div>
        <p id="emptyMsg" class="empty-msg">아직 기록이 없어요. 첫 일기를 남겨보세요!</p>
      </div>

      <div id="calendarView" class="hidden">
        <div class="calendar-header">
          <button type="button" id="prevMonthBtn" class="cal-nav-btn" aria-label="이전 달">‹</button>
          <div class="calendar-title" id="calendarTitle"></div>
          <button type="button" id="nextMonthBtn" class="cal-nav-btn" aria-label="다음 달">›</button>
        </div>
        <div class="calendar-weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
    </section>
  </main>

  <div id="detailModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-btn">&times;</button>
      <div id="modalBody"></div>
      <div class="modal-actions" id="modalActions">
        <button id="shareBtn" class="share-btn">📤 공유하기</button>
        <button id="deleteBtn" class="delete-btn">삭제</button>
      </div>
    </div>
  </div>

  <div id="lockScreen" class="lock-screen hidden">
    <div class="lock-screen-content">
      <div class="lock-icon">🔒</div>
      <div class="lock-title" id="lockTitle">패턴을 그려주세요</div>
      <p class="lock-msg" id="lockMsg"></p>
      <div class="lock-grid" id="lockGrid" touch-action="none">
        <svg class="lock-lines" id="lockLines"></svg>
        <div class="lock-dot" data-idx="0"></div>
        <div class="lock-dot" data-idx="1"></div>
        <div class="lock-dot" data-idx="2"></div>
        <div class="lock-dot" data-idx="3"></div>
        <div class="lock-dot" data-idx="4"></div>
        <div class="lock-dot" data-idx="5"></div>
        <div class="lock-dot" data-idx="6"></div>
        <div class="lock-dot" data-idx="7"></div>
        <div class="lock-dot" data-idx="8"></div>
      </div>
      <button type="button" id="lockForgotBtn" class="lock-forgot-btn hidden">패턴을 잊으셨나요?</button>
      <div class="lock-manage-links hidden" id="lockManageLinks">
        <button type="button" id="lockChangeLink" class="lock-link">패턴 변경</button>
        <button type="button" id="lockDisableLink" class="lock-link">잠금 끄기</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
